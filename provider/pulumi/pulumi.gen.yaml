sdkVersion: 0.0.0
resources:
  KubernetesCluster:
    package: kubernetes
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: extensions/kubernetes/v1beta1
    apiFunctionOverwrites:
      create: CreateOrUpdateClusterWithResponse
      read: GetClusterWithResponse
      update: CreateOrUpdateClusterWithResponse
      delete: DeleteClusterWithResponse

  KubernetesNodePool:
    package: kubernetes
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    extraPaths:
      - cluster
    apiPackage: extensions/kubernetes/v1beta1
    apiFunctionOverwrites:
      create: CreateOrUpdateNodePoolWithResponse
      read: GetNodePoolWithResponse
      update: CreateOrUpdateNodePoolWithResponse
      delete: DeleteNodePoolWithResponse

  NetworkLoadBalancer:
    package: loadbalancer
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: extensions/loadbalancer/v1beta1
    providerPrefixOverwrite: LoadBalancerProviderPrefix

  InternetNatGatewayInstance:
    package: natgateway
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: extensions/natgateway/v1beta1
    providerPrefixOverwrite: NATGatewayProviderPrefix

  ObjectStorageAccount:
    package: objectstorage
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: extensions/objectstorage/v1beta1
    providerPrefixOverwrite: ObjectStorageProviderPrefix
    apiFunctionOverwrites:
      create: CreateOrUpdateAccountWithResponse
      read: GetAccountWithResponse
      update: CreateOrUpdateAccountWithResponse
      delete: DeleteAccountWithResponse

  Role:
    package: authorization
    withoutWorkspace: true
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/authorization/v1

  RoleAssignment:
    package: authorization
    withoutWorkspace: true
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/authorization/v1

  Instance:
    package: compute
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/compute/v1

  SecurityGroup:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  SecurityGroupRule:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  Nic:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  PublicIp:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  Network:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  InternetGateway:
    package: network
    withoutWorkspace: false
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  Subnet:
    package: network
    withoutWorkspace: false
    extraPaths:
      - network
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  RouteTable:
    package: network
    withoutWorkspace: false
    extraPaths:
      - network
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/network/v1

  Image:
    package: storage
    withoutWorkspace: true
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/storage/v1

  BlockStorage:
    package: storage
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/storage/v1

  Workspace:
    package: workspace
    withoutWorkspace: true
    input:
      - Labels
      - Annotations
      - Extensions
      - Spec
    output:
      - Metadata
      - Status
    apiPackage: foundation/workspace/v1

getterFunctions:
  storage:
    GetSkus:
      apiPackage: foundation/storage/v1
      withoutWorkspace: true
      clientFunction: ListSkus
      responseType: SkuIterator
      outputType: StorageSku

  region:
    GetRegions:
      apiPackage: foundation/region/v1
      withoutWorkspace: true
      withoutTenant: true
      clientFunction: ListRegions
      responseType: RegionIterator
      outputType: Region
      providerPrefixOverwrite: RegionsProviderPrefix

  network:
    GetSkus:
      apiPackage: foundation/network/v1
      withoutWorkspace: true
      clientFunction: ListSkus
      responseType: SkuIterator
      outputType: NetworkSku

